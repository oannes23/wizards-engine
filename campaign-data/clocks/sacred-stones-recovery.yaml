name: Sacred Stones Recovery
segments: 4
progress: 0
notes: >
  Tracks the group's progress toward recovering the three sacred ford
  marker stones currently embedded in the Iron Compact's sluice mechanism
  at Argos Ford. No progress yet — the group knows where the stones are
  (Enyo's infiltration confirmed their location) but has not yet developed
  a plan for removing them without triggering immediate Compact military
  response. Completing this clock is a prerequisite for the ritual to
  strengthen Aelion and restore the river flow. Segments represent:
  (1) securing a distraction or cover operation, (2) infiltrating the
  Ford, (3) extracting the stones without destroying the sluice mechanism,
  (4) transporting them to safety.
