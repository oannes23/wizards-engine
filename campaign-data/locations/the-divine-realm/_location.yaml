name: The Divine Realm
description: >
  The metaphysical layer above and behind the mortal world — not a separate
  physical location but a different orientation of reality accessible through
  oracle trance, dream walking, death, or specific ritual approaches. The divine
  realm is not uniform: it contains Olympos Peak (the court of the Olympian
  Assembly), the Undermarsh (where shades dwell), the Dream Road (Hypnos's
  territory), and various contested edge-spaces where chthonic beings operate
  without clear jurisdiction. Time moves differently throughout — hours in the
  Dream Road can be minutes in the mortal world, while Olympos operates on
  divine time that is mostly irrelevant to mortals.
notes: >
  The Iron Compact's formal claims have been formally filed with the Olympian
  court, which means the divine realm is actively aware of mortal events in a
  way it usually isn't. Herald Kassian moves between the divine realm and the
  mortal world as part of his observation duties.
features:
  - name: Paradigm Pressure
    description: The Iron Age's rise is visible here as a slow dimming of older shrine-light and a strengthening of Iron Voice's signature resonance.
