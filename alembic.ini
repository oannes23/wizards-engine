# Alembic configuration for Wizards Engine.
# The sqlalchemy.url below is used only as a fallback; env.py reads
# WIZARDS_DB_PATH at runtime to construct the actual URL.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Migration file naming: <rev>_<slug>.py
# file_template = %%(rev)s_%%(slug)s

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
