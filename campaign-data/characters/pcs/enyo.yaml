bonds:
  - name: Recruited Into This
    target:
      type: character
      name: Lysara
    description: >
      Lysara's vision brought Enyo into the group. Enyo is grateful but
      wary — she's still evaluating whether the cause justifies the exposure.
    charges: 4
  - name: Warrior Trust
    target:
      type: character
      name: Theron
    description: >
      Competence-based bond. Enyo trusts Theron to do his job in a fight and
      not ask questions she doesn't want to answer. This is high praise from her.
    charges: 5
  - name: Exile's Debt
    target:
      type: group
      name: Troikas Resistance
    description: >
      The underground network that formed after the oligarchic coup, partly
      enabled by Enyo's actions. She feels responsible for their safety even
      from a distance.
    charges: 4
  - name: Adversarial
    target:
      type: group
      name: Iron Compact
    description: >
      The Iron Compact's agents were present at the Troikas coup — possibly
      orchestrated it. Enyo holds them responsible for her exile. Personal.
    charges: 2
    degradations: 2
  - name: Professional Caution
    target:
      type: character
      name: Myrtos
    description: >
      Myrtos of the Iron Compact's intelligence arm approached Enyo before she
      left Troikas. She refused his offer but he didn't seem bothered. That
      worries her more than anger would have.
    charges: 2
    degradations: 1
magic_effects:
  - name: Poison-Sense
    description: >
      Enyo can detect the presence of poisons and alchemical compounds by
      taste and smell at concentrations that would be imperceptible to others.
      She can identify the base components of most preparations she encounters
      and estimate their potency. Divine-tier toxins appear to her as a
      distinctive bitterness layered under the mundane signature.
    effect_type: permanent
    power_level: 2
  - name: Antidote Synthesis
    description: >
      Given time and materials, Enyo can construct antidotes to most natural
      poisons and a handful of magically enhanced ones. Two of her current
      preparations also function as short-duration divine-suppression agents —
      she doesn't fully understand how she synthesized them and hasn't done
      so again.
    effect_type: instant
    power_level: 3
