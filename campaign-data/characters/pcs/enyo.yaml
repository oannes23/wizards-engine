name: Enyo
detail_level: full
description: >
  A former temple-guard from Troikas who was exiled after she refused an order
  to execute political prisoners during the city's recent oligarchic coup.
  She carries the techniques of the Troikas poison-tradition, which her order
  maintained under the guise of "antidote scholarship." Enyo is calculating,
  self-contained, and fiercely loyal to those who have earned it. She perceives
  divine presences as a sharpening of all her senses simultaneously — the way
  the air feels just before lightning.
notes: >
  Detection method: all senses sharpen simultaneously — pre-lightning clarity.
  The exile from Troikas is recent (two months ago). The oligarchs who ordered
  the executions are consolidating power and have apparently hired an assassin
  to deal with "witnesses." Enyo suspects she is on that list. Her refusal to
  obey the execution order cost the Troikas temple-guard order its political
  independence — she carries guilt about this.
secrets: >
  Enyo did not simply refuse the execution order. She helped three of the
  prisoners escape — including a woman named Phila who is now deep underground
  in Troikas running a resistance cell. Enyo and Phila had a personal
  relationship; Phila was the reason Enyo stayed in Troikas as long as she
  did. She hasn't told Lysara or Theron about Phila, and if the party ever
  reaches Troikas, the reunion will be complicated.

  The poison craft: Two of the preparations Enyo knows are technically
  capable of affecting full Olympian gods at reduced potency. She discovered
  this by accident. She has told no one.
attributes:
  magic_detection: pre-lightning sense sharpening
  former_role: Temple-guard, Troikas Order of Antidotes
  notable_items:
    - Poison kit (7 active preparations, 3 antidotes)
    - Bronze short-sword
    - Temple-guard sigil (kept hidden, technically incriminating)
