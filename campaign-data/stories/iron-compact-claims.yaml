name: The Iron Compact's Divine Claims
summary: >
  The Iron Compact has filed formal claims with the Olympian Assembly asserting
  that their patron deity Iron Voice supersedes older divine contracts in the
  Argos region — which would legally allow them to void the existing oracle
  oaths, water compacts, and mortal-divine agreements that structure the
  territory. The Keepers of the Sacred Fire have filed counter-documentation.
  The Assembly is reviewing. If the Compact's claims succeed, it creates a
  legal framework for erasing the older divine-mortal relationship network
  across the entire Known World.
status: active
tags: ["divine-court", "iron-compact", "political", "main-plot"]
owners:
  - type: group
    name: Iron Compact
  - type: group
    name: Keepers of the Sacred Fire
entries:
  - text: >
      The group learns from Magistra Vaela that the Compact's claims were formally
      filed six weeks ago. The Assembly's review is Themis's jurisdiction; she has
      ordered observation before action. This is standard procedure but the timeline
      is unclear.
    author: "GM"
    character: null
    session: 2
  - text: >
      Drakos confirms in his meeting with Lysara that the sacred ford marker stones
      were removed deliberately — not incidentally. He calls it "clearing outdated
      religious infrastructure." His confidence suggests the Compact believes their
      divine claims will succeed.
    author: "GM"
    character: null
    session: 4
  - text: >
      The Moirai's oracle trance at the ford: "the stones remember what the river
      forgets." This suggests the sacred marker stones may be a physical component
      of the older divine contracts — destroying or removing them may be weakening
      the legal basis for the Keepers' counter-claims.
    author: "Player Asha"
    character: "Lysara"
    session: 3
  - text: >
      Orestes confirms from his documentation: the sacred marker stones at Argos
      Ford are listed as physical witnesses on eleven separate divine-mortal
      contracts spanning four centuries. They are not decorative. Removing them
      from the ford is legally equivalent, in the older contract tradition, to
      removing a witness signature. The Compact almost certainly knows this.
    author: "Player Gale"
    character: "Orestes"
    session: 3
  - text: >
      Mikkos, fresh eyes on the problem: the Compact filed in the divine court
      before they removed the stones. Sequence matters. If they had removed the
      stones before filing, the Assembly might have ruled immediately on contract
      violation. By filing first, they put the Assembly in the position of ruling
      on a situation that changes while the ruling is pending. This is either
      coincidence or extremely sophisticated divine-court procedure.
    author: "Player Evan"
    character: "Mikkos"
    session: 4
  - text: >
      Kassian's second appearance in Session 5: he delivers a formally neutral
      message from the Assembly that the second hearing has been scheduled.
      He adds, informally, that the "physical evidence situation" will be noted
      by the reviewing party. He looks directly at the location of the group's
      documentation materials when he says this. He then leaves before anyone
      can respond.
    author: "GM"
    character: null
    session: 5
children:
  - name: The Sacred Stones
    summary: >
      The Argos Ford's sacred marker stones are now counterweights in the Iron
      Compact's sluice mechanism. Recovering them may be necessary both to
      restore Aelion and to strengthen the Keepers' divine-court position.
    status: active
    tags: ["argos", "aelion", "artifacts"]
    owners:
      - type: location
        name: Argos Ford
    entries:
      - text: >
          Enyo's infiltration confirmed the stones are embedded in the sluice
          mechanism. Three stones, roughly hand-sized, carved with river-oath
          symbols. Removing them will require a planned operation — they are
          now load-bearing components.
        author: "GM"
        character: null
        session: 3
