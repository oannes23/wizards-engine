name: Iron Voice Manifestation
segments: 6
progress: 3
associated_with:
  type: character
  name: Iron Voice
notes: >
  Tracks how close Iron Voice is to achieving a full mortal-realm
  manifestation — physical presence rather than divine influence at
  a distance. Three segments complete: the Iron Works expansion has
  given the deity significant material foothold (segment 1), the
  formal divine court filing has increased divine attention on the
  Argos region (segment 2), and the removal of the sacred marker stones
  has weakened the older divine-compact framework that was the primary
  barrier (segment 3). At segment 6, Iron Voice manifests physically
  in the Argos region, which would dramatically accelerate the Compact's
  political position and make conventional opposition much more difficult.
  The group does not yet know this clock exists — its existence was
  inferred from Kassian's evasive responses to direct questions about
  the divine court timeline.
