name: Korinna's Debt to Arkos
segments: 5
progress: 2
associated_with:
  type: character
  name: Korinna
notes: >
  Tracks Arkos the shade's escalating demands on Korinna in exchange for
  the Undermarsh passage he granted her. Korinna doesn't fully understand
  what she owes or when the debt will be called in. Progress represents
  Arkos's increasing visibility and insistence: at segment 1 he was
  peripheral and occasional; at segment 2 he appears more frequently and
  has begun speaking directly rather than in impressions. When the clock
  completes, Arkos will make his demand explicit — which may involve
  something Korinna is not willing to give. The group doesn't know this
  clock exists.
