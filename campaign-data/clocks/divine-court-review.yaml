name: Olympian Court Review
segments: 8
progress: 4
associated_with:
  type: group
  name: Olympian Assembly
notes: >
  Tracks the Olympian Assembly's formal review of the Iron Compact's divine
  legitimacy claims. At segment 8, the Assembly will issue a ruling that
  either validates or invalidates the Compact's supersession claim. Current
  progress: Themis's observation order has been in effect for six weeks
  (segment 1), initial claims were formally acknowledged (segment 2), the
  Keepers' counter-documentation was admitted for review (segment 3), and
  Herald Kassian submitted his first observation report (segment 4). Four
  segments remain: a second hearing with new evidence, the divine court's
  deliberation period, any emergency exceptions being heard, and the final
  ruling. The Compact is attempting to accelerate the timeline by removing
  the physical evidence (sacred stones) that the Keepers' claims depend on.
