name: Iron Compact Regional Consolidation
segments: 6
progress: 3
associated_with:
  type: group
  name: Iron Compact
notes: >
  Tracks the Compact's formal incorporation of the Argos region. At
  segment 6, the incorporation is complete and Argos becomes a Compact
  territory with no remaining independent council. Current proceedings
  are moving through deliberate bureaucratic stages. The Olympian
  Assembly's ongoing review is creating a small delay (they cannot
  finalize incorporation while divine claims are being adjudicated),
  but without intervention the review will conclude in the Compact's favor.
