<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wizards Engine</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <!-- API error toast — shown on api:error event, hidden by default -->
    <div id="api-toast" role="alert" aria-live="assertive" hidden>
      <span id="api-toast-message"></span>
      <button id="api-toast-close" aria-label="Dismiss">&#x2715;</button>
    </div>

    <!-- Success toast — shown on api:success event (e.g. proposal approved) -->
    <div id="api-success-toast" role="status" aria-live="polite" hidden>
      <span id="api-success-toast-message"></span>
    </div>

    <main class="container" x-data>
      <!-- Router renders the current view here -->
      <div id="view"></div>
    </main>

    <!-- Bottom navigation bar (mobile) / top bar (desktop).
         Hidden by default; nav.js shows it once the user is authenticated
         and not on a login/setup route. -->
    <div id="nav-container" hidden></div>

    <!-- Load order: utils → constants → api → store → router → views → components → app → Alpine (CDN, must be last) -->
    <script src="/static/js/utils.js" defer></script>
    <script src="/static/js/constants.js" defer></script>
    <script src="/static/js/api.js" defer></script>
    <script src="/static/js/store.js" defer></script>
    <script src="/static/js/router.js" defer></script>
    <script src="/static/js/views/login.js" defer></script>
    <script src="/static/js/views/setup.js" defer></script>
    <script src="/static/js/views/join.js" defer></script>
    <script src="/static/js/views/proposal-submit.js" defer></script>
    <script src="/static/js/views/proposals-list.js" defer></script>
    <script src="/static/js/views/proposal-detail.js" defer></script>
    <script src="/static/js/components/nav.js" defer></script>
    <script src="/static/js/components/step-indicator.js" defer></script>
    <script src="/static/js/components/meter-bar.js" defer></script>
    <script src="/static/js/components/charge-dots.js" defer></script>
    <script src="/static/js/components/clock-progress.js" defer></script>
    <script src="/static/js/components/data-table.js" defer></script>
    <script src="/static/js/components/expandable-item.js" defer></script>
    <script src="/static/js/components/game-object-card.js" defer></script>
    <script src="/static/js/components/feed-item.js" defer></script>
    <script src="/static/js/components/feed-list.js" defer></script>
    <script src="/static/js/components/proposal-card.js" defer></script>
    <script src="/static/js/components/sacrifice-builder.js" defer></script>
    <script src="/static/js/components/narrative-modal.js" defer></script>
    <script src="/static/js/views/gm-queue.js" defer></script>
    <script src="/static/js/views/gm-dashboard.js" defer></script>
    <script src="/static/js/views/gm-sessions.js" defer></script>
    <script src="/static/js/views/session-detail.js" defer></script>
    <script src="/static/js/views/gm-players.js" defer></script>
    <script src="/static/js/views/gm-actions.js" defer></script>
    <script src="/static/js/views/gm-templates.js" defer></script>
    <script src="/static/js/views/gm-clocks.js" defer></script>
    <script src="/static/js/views/character.js" defer></script>
    <script src="/static/js/views/character-edit.js" defer></script>
    <script src="/static/js/views/feed.js" defer></script>
    <script src="/static/js/views/gm-feed.js" defer></script>
    <script src="/static/js/views/world.js" defer></script>
    <script src="/static/js/views/world-detail.js" defer></script>
    <script src="/static/js/views/story-detail.js" defer></script>
    <script src="/static/js/views/profile.js" defer></script>
    <script src="/static/js/app.js" defer></script>
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
      defer
    ></script>
  </body>
</html>
