name: Aelion and the River
summary: >
  Theron's divine father is dying by slow dissolution as the Iron Compact
  diverts his watershed for industrial use. Aelion is trying to communicate
  through dreams but Theron lacks the dreaming skill to receive clear messages.
  Aelion also made a secret bargain with the Compact years ago — granting water
  rights in exchange for protection — and is too ashamed to confess this.
  Theron doesn't know the full picture and likely won't until the story forces
  the revelation.
status: active
tags: ["theron", "aelion", "river", "divine-dissolution", "secrets"]
owners:
  - type: character
    name: Theron
  - type: character
    name: Aelion
entries:
  - text: >
      At the seasonal ford, the river is ankle-deep where it should be knee-deep.
      Theron notices immediately. The seasonal timing is wrong — this is drought-
      level flow during the rainy season.
    author: "GM"
    character: "Theron"
    session: 1
  - text: >
      Theron's uncontrolled rage at Argos Ford when he saw the sacred stones used
      as counterweights. He remembers approaching the sluice; he does not remember
      what happened next. Lysara and Enyo pulled him back and have said only that
      it was "a difficult moment."
    author: "Player Brom"
    character: "Theron"
    session: 3
  - text: >
      Theron attempts to reach his father through intentional sleep that night.
      He gets fragments — water-sound, a broad-shouldered figure standing in shallow
      water, a sense of shame — but no coherent message. He wakes more worried
      than before.
    author: "Player Brom"
    character: "Theron"
    session: 4
  - text: >
      Korinna, when told about the dream fragments, recognizes the emotional
      signature of shame combined with attempted communication. She doesn't
      tell Theron what she recognizes. She tells the GM privately that Aelion's
      shame feels specifically like the shame of someone who made a choice they
      cannot undo and are now watching its consequences.
    author: "Player Dara"
    character: "Korinna"
    session: 4
  - text: >
      Orestes confirms from his documentation that a water-rights bargain of
      the type Aelion apparently made has historical precedent. Divine entities
      under pressure sometimes made short-term agreements that they expected
      to renegotiate before the long-term costs became apparent. Two documented
      cases. Neither ended well for the divine party to the bargain.
    author: "Player Gale"
    character: "Orestes"
    session: 5
  - text: >
      The Argos Ford sluice gates at night: Theron stands at the gate looking
      at the reduced flow and realizes that somewhere in the mechanism, the
      water still knows where it was supposed to go. He can feel it — not
      anger exactly, but a specific wrongness that makes his hands shake. His
      father is in that wrongness. He doesn't go in. He should go in.
    author: "Player Brom"
    character: "Theron"
    session: 5
children: []
